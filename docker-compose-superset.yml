x-superset-image: &superset-image ${DOCKER_IMAGE_SUPERSET:-apache/superset:${TAG:-latest-dev}}
x-superset-common: &superset-common
  image: *superset-image
  environment:
    SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py

x-superset-depends-on: &superset-depends-on
  - superset-db
  - superset-keydb
x-superset-volumes: &superset-volumes
  # /app/pythonpath_docker will be appended to the PYTHONPATH in the final container
  - ./superset/docker:/app/docker
  - superset_home:/app/superset_home
  - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
x-default-networks: &default-networks
  - ${NETWORK_NAME:-open-source-data-stack}

services:
  superset-keydb:
    image: ${DOCKER_IMAGE_KEYDB:-eqalpha/keydb:x86_64_v6.3.4}
    container_name: superset-keydb
    restart: unless-stopped
    volumes:
      - redis:/data
    networks: *default-networks
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  superset-db:
    image: ${DOCKER_IMAGE_POSTGRES:-postgres:18}
    container_name: postgres-superset
    ports:
      - 5434:5432
    environment:
      - POSTGRES_USER=${SUPERSET_DATABASE_USER:-superset}
      - POSTGRES_PASSWORD=${SUPERSET_DATABASE_PASSWORD:-superset}
      - POSTGRES_DB=${SUPERSET_DATABASE_DB:-superset}
    restart: unless-stopped
    volumes:
      - superset_db_home:/var/lib/postgresql
    networks: *default-networks
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUPERSET_DATABASE_USER} -d ${SUPERSET_DATABASE_DB} -h localhost -p 5432 || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  superset:
    <<: *superset-common
    container_name: superset-app
    command: ["/app/docker/docker-bootstrap.sh", "app-gunicorn"]
    user: "root"
    restart: unless-stopped
    ports:
      - 8088:8088
    depends_on: *superset-depends-on
    volumes: *superset-volumes
    networks: *default-networks
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  superset-init:
    <<: *superset-common
    container_name: superset-init
    command: ["/app/docker/docker-init.sh"]
    depends_on: *superset-depends-on
    user: "root"
    volumes: *superset-volumes
    networks: *default-networks

  superset-worker:
    <<: *superset-common
    container_name: superset-worker
    command: ["/app/docker/docker-bootstrap.sh", "worker"]
    restart: unless-stopped
    depends_on: *superset-depends-on
    user: "root"
    volumes: *superset-volumes
    networks: *default-networks
    healthcheck: 
      test: [
        "CMD-SHELL",
        "celery -A superset.tasks.celery_app:app inspect ping -d celery@$$HOSTNAME --timeout=5 2>/dev/null | grep -q pong"
      ]     
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 60s

  superset-worker-beat:
    <<: *superset-common
    container_name: superset-worker-beat
    command: ["/app/docker/docker-bootstrap.sh", "beat"]
    restart: unless-stopped
    depends_on: *superset-depends-on
    user: "root"
    volumes: *superset-volumes
    networks: *default-networks
    healthcheck:
      test: [
        "CMD-SHELL",
        "pgrep -f 'celery.*beat' >/dev/null || exit 1; test -f /tmp/celerybeat-schedule || exit 1; find /tmp/celerybeat-schedule -mmin -2 >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 60s

volumes:
  superset_home:
    external: false
  superset_db_home:
    external: false
  redis:
    external: false

networks:
  open-source-data-stack:
    external: true
 